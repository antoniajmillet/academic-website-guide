<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="100%" height="100%" fill="#fffaf2"/>
  <rect x="35" y="35" width="1130" height="630" rx="18" fill="#ffffff" stroke="#203039" stroke-width="4"/>
  <rect x="35" y="35" width="1130" height="105" rx="18" fill="#efb84f"/>
  <rect x="35" y="118" width="1130" height="22" fill="#efb84f"/>
  <text x="90" y="105" class="title">Three files, three jobs</text>
  <text x="90" y="190" class="body">HTML  →  content and structure</text>
<text x="90" y="244" class="body">CSS   →  colors, spacing, typography, and layout</text>
<text x="90" y="298" class="body">JavaScript  →  small interactive or automatic behaviors</text>
<text x="90" y="352" class="body"></text>
<text x="90" y="406" class="body">Start by learning where a change belongs—not every line of code.</text>
  <style>
    .title { font: 700 42px Arial, sans-serif; fill: #203039; }
    .body { font: 500 30px Arial, sans-serif; fill: #203039; }
  </style>
