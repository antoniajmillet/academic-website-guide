<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="100%" height="100%" fill="#fffaf2"/>
  <rect x="35" y="35" width="1130" height="630" rx="18" fill="#ffffff" stroke="#203039" stroke-width="4"/>
  <rect x="35" y="35" width="1130" height="105" rx="18" fill="#efb84f"/>
  <rect x="35" y="118" width="1130" height="22" fill="#efb84f"/>
  <text x="90" y="105" class="title">View Page Source vs. Inspect</text>
  <text x="90" y="190" class="body">VIEW PAGE SOURCE</text>
<text x="90" y="244" class="body">Shows the HTML originally delivered to the browser.</text>
<text x="90" y="298" class="body"></text>
<text x="90" y="352" class="body">INSPECT</text>
<text x="90" y="406" class="body">Shows the live page, applied CSS, layout, and temporary edits.</text>
<text x="90" y="460" class="body"></text>
<text x="90" y="514" class="body">Use both to learn. Check the license before reusing code.</text>
  <style>
    .title { font: 700 42px Arial, sans-serif; fill: #203039; }
    .body { font: 500 30px Arial, sans-serif; fill: #203039; }
  </style>
</svg>
